services:
  redis:
    image: "redis:8"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      start_period: 30s
      interval: 300s
      start_interval: 5s
      retries: 3
      timeout: 10s
    command:
      - redis-server
      - "--requirepass"
      - "${REDIS_PASSWORD}"
    env_file:
      - ./.env
    ports:
      - "6375:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - redis_net
volumes:
  redis_data:
networks:
  redis_net:
    external: true
