services:
  mssql_db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - ./mssql_data:/var/opt/mssql/data
